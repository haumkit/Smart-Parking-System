version: '3.8'

services:
  # MongoDB (optional - if not using MongoDB Atlas)
  # mongodb:
  #   image: mongo:7
  #   container_name: smart-parking-mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: admin
  #     MONGO_INITDB_ROOT_PASSWORD: password
  #   networks:
  #     - smart-parking-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-parking-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-server:5001
      - AI_FALLBACK=${AI_FALLBACK:-false}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - ai-server
    networks:
      - smart-parking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI Server
  ai-server:
    build:
      context: ./ai_server
      dockerfile: Dockerfile
    container_name: smart-parking-ai
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:80
      - WPOD_MODEL_PATH=models/wpod-net
      - OCR_MODEL_PATH=models/last-dataset-update.h5
      - SLOT_MODEL_PATH=models/slots_model.pt
      - SLOT_PROCESSED_DIR=uploads/processed
      - TOTAL_PARKING_SLOTS=${TOTAL_PARKING_SLOTS:-15}
      - SLOT_DETECTION_INTERVAL=${SLOT_DETECTION_INTERVAL:-15}
      - SLOT_DETECTION_CAMERAS=${SLOT_DETECTION_CAMERAS:-parking}
      - BACKEND_WEBHOOK_URL=http://backend:5000/api/v1/ai/webhook/plate-detected
      - BACKEND_SLOT_WEBHOOK_URL=http://backend:5000/api/v1/ai/webhook/slots-detected
    volumes:
      - ./ai_server/models:/app/models
      - ./ai_server/uploads:/app/uploads
    networks:
      - smart-parking-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=${VITE_API_BASE:-http://localhost:5000/api/v1}
    container_name: smart-parking-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart-parking-network
    restart: unless-stopped

networks:
  smart-parking-network:
    driver: bridge

